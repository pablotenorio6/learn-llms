# LiteLLM proxy config.
#
# - model_name es el alias que ve la API (y la UI). Estable.
# - litellm_params.model es la cadena "<provider>/<model_id>" interna.
# - ollama_chat/ habilita el modo de tool-calling estructurado para Ollama
#   (mejor que el legacy 'ollama/' para tools). Para embeddings y modelos
#   sin tools usamos 'ollama/' directamente.

model_list:
  # ---- Ollama local (GPU del host) ----
  - model_name: llama-local
    litellm_params:
      model: ollama_chat/llama3.1:8b-instruct-q4_K_M
      api_base: http://ollama:11434
  - model_name: qwen-local
    litellm_params:
      model: ollama_chat/qwen2.5:7b-instruct-q4_K_M
      api_base: http://ollama:11434
  - model_name: phi-local
    litellm_params:
      model: ollama/phi3.5:3.8b
      api_base: http://ollama:11434

  # ---- Embeddings local ----
  - model_name: nomic-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

  # ---- OpenAI ----
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # ---- Anthropic ----
  # Nota: si el alias del modelo cambia, basta con tocar 'model:' aquí.
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ---- AWS Bedrock ----
  # Las credenciales NO van aquí: LiteLLM las toma del entorno del contenedor
  # (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION_NAME), que el
  # docker-compose inyecta desde el .env. Igual que OpenAI/Anthropic.
  #
  # OJO con el model id: muchos modelos solo se sirven por INFERENCE PROFILE
  # con prefijo de región (us./eu./apac.). Verifica el id exacto contra TU
  # cuenta y región:  aws bedrock list-foundation-models --region <region>
  # y habilita el modelo en la consola (Bedrock → Model access) antes de usarlo.
  # Solo modelos con tool use (Converse API) sirven para el modo agente:
  # Claude, Amazon Nova y Llama 3.1+ lo soportan.
  - model_name: claude-sonnet-bedrock
    litellm_params:
      model: bedrock/global.anthropic.claude-sonnet-4-6
      aws_region_name: os.environ/AWS_REGION_NAME
  - model_name: claude-haiku-bedrock
    litellm_params:
      model: bedrock/global.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_region_name: os.environ/AWS_REGION_NAME
  - model_name: claude-opus-bedrock
    litellm_params:
      model: bedrock/global.anthropic.claude-opus-4-8
      aws_region_name: os.environ/AWS_REGION_NAME

litellm_settings:
  # Tira silenciosamente parámetros que un proveedor concreto no entiende
  # (p.ej. presence_penalty con algunos endpoints) en vez de fallar.
  drop_params: true
  # Reintentos básicos por timeouts transitorios.
  num_retries: 2
  request_timeout: 600
  set_verbose: false
  telemetry: false
  # ---- Observabilidad (Fase 2) ----
  # langfuse: traza cada llamada al modelo en el servidor self-hosted. La app
  #   reenvía metadata.trace_id en cada request, así la generation cuelga del
  #   trace correcto (request del usuario, iteración del agente, etc.).
  # prometheus: expone /metrics en el propio puerto del proxy (4000) con
  #   contadores e histogramas por modelo/proveedor.
  success_callback: ["langfuse", "prometheus"]
  failure_callback: ["langfuse", "prometheus"]
  # /metrics del proxy es scrapeado por Prometheus dentro de la red interna;
  # apagamos auth para no tener que enviar Bearer desde prometheus.yml.
  require_auth_for_metrics_endpoint: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

<svg viewBox="0 0 880 940" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, sans-serif">
  <title id="title">Despliegue llm_ops con LiteLLM proxy y workflow del smoke test</title>
  <desc id="desc">Tres paneles. Arquitectura: contenedores API, LiteLLM, Ollama y Qdrant en una red Docker; la API ya no habla con Ollama directo, habla con LiteLLM en formato OpenAI. Vida de un POST /v1/chat/completions stream=true. Workflow del smoke_test.sh.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#777"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c96342"/>
    </marker>
    <marker id="arrow-cloud" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a76b8"/>
    </marker>
  </defs>

  <!-- ============== PANEL 1: ARCHITECTURE ============== -->
  <text x="20" y="26" fill="#1a1a1a" font-size="14" font-weight="600">1 · Arquitectura del despliegue (multi-proveedor vía LiteLLM)</text>

  <!-- Host -->
  <rect x="20" y="40" width="840" height="400" rx="6" fill="#fafafa" stroke="#d4d4d4"/>
  <text x="36" y="62" fill="#6b6b6b" font-size="11" font-weight="500">HOST · WINDOWS + DOCKER DESKTOP</text>

  <!-- Cliente (fuera de docker) -->
  <rect x="40" y="80" width="125" height="60" rx="4" fill="#ffffff" stroke="#c8c8c8" stroke-width="1.2"/>
  <text x="102.5" y="105" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Cliente</text>
  <text x="102.5" y="122" text-anchor="middle" fill="#6b6b6b" font-size="11">curl · SDK OpenAI · UI</text>

  <!-- GPU (recurso del host) -->
  <rect x="715" y="80" width="125" height="60" rx="4" fill="#ffffff" stroke="#c8c8c8" stroke-width="1.2"/>
  <text x="777.5" y="105" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">GPU</text>
  <text x="777.5" y="122" text-anchor="middle" fill="#6b6b6b" font-size="11">RTX 4060 · 8 GB</text>

  <!-- Cloud (fuera del host) -->
  <rect x="180" y="80" width="265" height="60" rx="4" fill="#f4f8fc" stroke="#4a76b8" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="312.5" y="103" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Cloud LLM APIs</text>
  <text x="312.5" y="120" text-anchor="middle" fill="#6b6b6b" font-size="11">api.openai.com · api.anthropic.com</text>
  <text x="312.5" y="134" text-anchor="middle" fill="#4a76b8" font-size="10" font-weight="600">opcional · vía OPENAI_API_KEY / ANTHROPIC_API_KEY</text>

  <!-- Docker network -->
  <rect x="40" y="170" width="820" height="250" rx="6" fill="#ffffff" stroke="#d4d4d4" stroke-dasharray="4 3"/>
  <text x="56" y="190" fill="#6b6b6b" font-size="11" font-weight="500">DOCKER NETWORK · default</text>

  <!-- API container -->
  <rect x="60" y="210" width="200" height="190" rx="5" fill="#ffffff" stroke="#c96342" stroke-width="1.5"/>
  <rect x="60" y="210" width="200" height="22" rx="5" fill="#ececec"/>
  <text x="74" y="226" fill="#333" font-size="10" font-weight="600">CONTAINER · llmops-api</text>
  <text x="74" y="255" fill="#1a1a1a" font-size="13" font-weight="600">FastAPI + Uvicorn</text>
  <text x="74" y="273" fill="#6b6b6b" font-size="11">/v1/chat /v1/embeddings</text>
  <text x="74" y="289" fill="#6b6b6b" font-size="11">/v1/models /v1/rag/*</text>
  <text x="74" y="305" fill="#6b6b6b" font-size="11">/v1/agents/run (SSE)</text>
  <text x="74" y="323" fill="#6b6b6b" font-size="11">middleware · auth · SSE</text>
  <text x="74" y="341" fill="#c96342" font-size="11" font-weight="600">LLMClient (openai SDK)</text>
  <text x="74" y="359" fill="#6b6b6b" font-size="11">watcher de docs/ (RAG)</text>
  <text x="74" y="387" font-family="ui-monospace, monospace" fill="#6b6b6b" font-size="10">:8000 ←→ host:8000</text>

  <!-- LiteLLM container (NEW) -->
  <rect x="285" y="210" width="200" height="190" rx="5" fill="#ffffff" stroke="#c96342" stroke-width="1.5"/>
  <rect x="285" y="210" width="200" height="22" rx="5" fill="#fbe6dd"/>
  <text x="299" y="226" fill="#c96342" font-size="10" font-weight="700">CONTAINER · llmops-litellm ★</text>
  <text x="299" y="255" fill="#1a1a1a" font-size="13" font-weight="600">LiteLLM proxy</text>
  <text x="299" y="273" fill="#6b6b6b" font-size="11">control plane:</text>
  <text x="299" y="289" fill="#6b6b6b" font-size="11">· routing por alias</text>
  <text x="299" y="305" fill="#6b6b6b" font-size="11">· master_key + virtual keys</text>
  <text x="299" y="321" fill="#6b6b6b" font-size="11">· retries · fallbacks</text>
  <text x="299" y="337" fill="#6b6b6b" font-size="11">· cost tracking</text>
  <text x="299" y="357" fill="#6b6b6b" font-size="11" font-style="italic">litellm-config.yaml</text>
  <text x="299" y="387" font-family="ui-monospace, monospace" fill="#6b6b6b" font-size="10">:4000 (solo red interna)</text>

  <!-- Ollama container -->
  <rect x="510" y="210" width="200" height="190" rx="5" fill="#ffffff" stroke="#c96342" stroke-width="1.5"/>
  <rect x="510" y="210" width="200" height="22" rx="5" fill="#ececec"/>
  <text x="524" y="226" fill="#333" font-size="10" font-weight="600">CONTAINER · llmops-ollama</text>
  <text x="524" y="255" fill="#1a1a1a" font-size="13" font-weight="600">Ollama runtime</text>
  <text x="524" y="273" fill="#6b6b6b" font-size="11">llama3.1:8b · qwen2.5:7b</text>
  <text x="524" y="289" fill="#6b6b6b" font-size="11">phi3.5:3.8b · nomic-embed</text>
  <text x="524" y="307" fill="#6b6b6b" font-size="11">GGUF en VRAM (keep_alive)</text>
  <text x="524" y="325" fill="#6b6b6b" font-size="11">volumen ollama_data</text>
  <text x="524" y="387" font-family="ui-monospace, monospace" fill="#6b6b6b" font-size="10">:11434 → GPU passthrough</text>

  <!-- Qdrant container (chiquito, fuera del eje principal) -->
  <rect x="735" y="210" width="115" height="100" rx="5" fill="#ffffff" stroke="#c96342" stroke-width="1.5"/>
  <rect x="735" y="210" width="115" height="22" rx="5" fill="#ececec"/>
  <text x="744" y="226" fill="#333" font-size="9" font-weight="600">llmops-qdrant</text>
  <text x="744" y="251" fill="#1a1a1a" font-size="12" font-weight="600">Qdrant</text>
  <text x="744" y="266" fill="#6b6b6b" font-size="10">vector DB</text>
  <text x="744" y="281" fill="#6b6b6b" font-size="10">dim 768 · cosine</text>
  <text x="744" y="302" font-family="ui-monospace, monospace" fill="#6b6b6b" font-size="9">:6333 · :6334</text>

  <!-- Arrows -->
  <!-- Cliente → API -->
  <path d="M 102.5 145 L 102.5 210" stroke="#777" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="110" y="182" font-family="ui-monospace, monospace" fill="#333" font-size="10">HTTP :8000</text>

  <!-- API → LiteLLM (acento) -->
  <path d="M 260 290 L 285 290" stroke="#c96342" stroke-width="1.8" fill="none" marker-end="url(#arrow-accent)"/>
  <text x="262" y="282" font-family="ui-monospace, monospace" fill="#c96342" font-size="9" font-weight="600">OpenAI fmt</text>

  <!-- LiteLLM → Ollama -->
  <path d="M 485 290 L 510 290" stroke="#777" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="487" y="282" font-family="ui-monospace, monospace" fill="#333" font-size="9">ollama:11434</text>

  <!-- API → Qdrant (para RAG embeddings/search) -->
  <path d="M 260 340 C 600 340, 600 260, 735 260" stroke="#777" stroke-width="1.5" fill="none" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text x="600" y="335" font-family="ui-monospace, monospace" fill="#333" font-size="9">RAG · qdrant:6333</text>

  <!-- Ollama → GPU -->
  <path d="M 668 210 L 668 145" stroke="#777" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="674" y="178" font-family="ui-monospace, monospace" fill="#333" font-size="10">CUDA</text>

  <!-- LiteLLM → Cloud (sale del host) -->
  <path d="M 385 210 C 385 170, 312.5 170, 312.5 145" stroke="#4a76b8" stroke-width="1.5" fill="none" stroke-dasharray="4 2" marker-end="url(#arrow-cloud)"/>
  <text x="320" y="195" font-family="ui-monospace, monospace" fill="#4a76b8" font-size="9" font-weight="600">HTTPS · si hay API key</text>

  <text x="36" y="430" fill="#6b6b6b" font-size="10">★ Nuevo · La API solo habla con LiteLLM en formato OpenAI. Añadir proveedores = añadir aliases al YAML del proxy y reiniciar el contenedor.</text>

  <!-- ============== PANEL 2: REQUEST FLOW ============== -->
  <text x="20" y="476" fill="#1a1a1a" font-size="14" font-weight="600">2 · Vida de un POST /v1/chat/completions (stream=true)</text>

  <rect x="20" y="490" width="840" height="160" rx="6" fill="#fafafa" stroke="#d4d4d4"/>

  <g transform="translate(40, 514)">
    <!-- Step 1 -->
    <circle cx="20" cy="20" r="14" fill="#c96342" opacity="0.15"/>
    <text x="20" y="25" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">1</text>
    <text x="48" y="16" font-family="ui-monospace, monospace" fill="#333" font-size="11">cliente</text>
    <text x="48" y="32" fill="#6b6b6b" font-size="10.5">POST JSON</text>
    <text x="48" y="46" fill="#6b6b6b" font-size="10.5">stream:true</text>

    <path d="M 145 20 L 175 20" stroke="#c96342" stroke-width="1.5" fill="none" marker-end="url(#arrow-accent)"/>

    <!-- Step 2 -->
    <circle cx="195" cy="20" r="14" fill="#c96342" opacity="0.15"/>
    <text x="195" y="25" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">2</text>
    <text x="223" y="16" font-family="ui-monospace, monospace" fill="#333" font-size="11">middleware</text>
    <text x="223" y="32" fill="#6b6b6b" font-size="10.5">X-Request-ID</text>
    <text x="223" y="46" fill="#6b6b6b" font-size="10.5">log + timer</text>

    <path d="M 320 20 L 350 20" stroke="#c96342" stroke-width="1.5" fill="none" marker-end="url(#arrow-accent)"/>

    <!-- Step 3 -->
    <circle cx="370" cy="20" r="14" fill="#c96342" opacity="0.15"/>
    <text x="370" y="25" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">3</text>
    <text x="398" y="16" font-family="ui-monospace, monospace" fill="#333" font-size="11">Pydantic</text>
    <text x="398" y="32" fill="#6b6b6b" font-size="10.5">valida body</text>
    <text x="398" y="46" fill="#6b6b6b" font-size="10.5">→ 422 si falla</text>

    <path d="M 495 20 L 525 20" stroke="#c96342" stroke-width="1.5" fill="none" marker-end="url(#arrow-accent)"/>

    <!-- Step 4 -->
    <circle cx="545" cy="20" r="14" fill="#c96342" opacity="0.15"/>
    <text x="545" y="25" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">4</text>
    <text x="573" y="16" font-family="ui-monospace, monospace" fill="#333" font-size="11">LLMClient</text>
    <text x="573" y="32" fill="#6b6b6b" font-size="10.5">openai SDK async</text>
    <text x="573" y="46" fill="#6b6b6b" font-size="10.5">→ litellm:4000/v1</text>

    <path d="M 690 20 L 720 20" stroke="#c96342" stroke-width="1.5" fill="none" marker-end="url(#arrow-accent)"/>

    <!-- Step 5 -->
    <circle cx="740" cy="20" r="14" fill="#c96342" opacity="0.15"/>
    <text x="740" y="25" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">5</text>
    <text x="768" y="16" font-family="ui-monospace, monospace" fill="#333" font-size="11">LiteLLM</text>
    <text x="768" y="32" fill="#6b6b6b" font-size="10.5">resuelve alias</text>
    <text x="768" y="46" fill="#6b6b6b" font-size="10.5">→ Ollama / OpenAI</text>
  </g>

  <!-- Bottom row -->
  <g transform="translate(40, 588)">
    <!-- Step 6 -->
    <circle cx="20" cy="0" r="14" fill="#c96342" opacity="0.15"/>
    <text x="20" y="5" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">6</text>
    <text x="48" y="-4" font-family="ui-monospace, monospace" fill="#333" font-size="11">backend → tokens streamed</text>
    <text x="48" y="12" fill="#6b6b6b" font-size="10.5">SSE chunks OpenAI ascendiendo por la cadena (LiteLLM normaliza)</text>

    <path d="M 350 0 L 380 0" stroke="#c96342" stroke-width="1.5" fill="none" marker-end="url(#arrow-accent)"/>

    <!-- Step 7 -->
    <circle cx="400" cy="0" r="14" fill="#c96342" opacity="0.15"/>
    <text x="400" y="5" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">7</text>
    <text x="428" y="-4" font-family="ui-monospace, monospace" fill="#333" font-size="11">SSE re-envuelto al cliente</text>
    <text x="428" y="12" fill="#6b6b6b" font-size="10.5">data: {...}\n\n  · · ·  data: [DONE]</text>
  </g>

  <!-- ============== PANEL 3: SMOKE TEST ============== -->
  <text x="20" y="688" fill="#1a1a1a" font-size="14" font-weight="600">3 · Workflow de bash scripts/smoke_test.sh</text>

  <rect x="20" y="702" width="840" height="220" rx="6" fill="#fafafa" stroke="#d4d4d4"/>

  <g transform="translate(40, 728)">
    <!-- 1 -->
    <circle cx="14" cy="10" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="14" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">1</text>
    <text x="40" y="8" font-family="ui-monospace, monospace" fill="#333" font-size="11">curl /healthz</text>
    <text x="40" y="22" fill="#6b6b6b" font-size="10.5">¿responde el proceso? (no toca LiteLLM ni proveedores)</text>
    <rect x="620" y="0" width="180" height="22" rx="3" fill="#ececec"/>
    <text x="710" y="14" text-anchor="middle" fill="#333" font-size="10" font-weight="600">{"status":"ok"}</text>

    <!-- 2 -->
    <circle cx="14" cy="42" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="46" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">2</text>
    <text x="40" y="40" font-family="ui-monospace, monospace" fill="#333" font-size="11">curl /readyz</text>
    <text x="40" y="54" fill="#6b6b6b" font-size="10.5">¿la API alcanza LiteLLM y el proxy enumera modelos?</text>
    <rect x="620" y="32" width="180" height="22" rx="3" fill="#ececec"/>
    <text x="710" y="46" text-anchor="middle" fill="#333" font-size="10" font-weight="600">200 · models_available</text>

    <!-- 3 -->
    <circle cx="14" cy="74" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="78" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">3</text>
    <text x="40" y="72" font-family="ui-monospace, monospace" fill="#333" font-size="11">curl /v1/models</text>
    <text x="40" y="86" fill="#6b6b6b" font-size="10.5">listado de aliases del YAML (qwen-local, gpt-4o-mini, …)</text>
    <rect x="620" y="64" width="180" height="22" rx="3" fill="#ececec"/>
    <text x="710" y="78" text-anchor="middle" fill="#333" font-size="10" font-weight="600">"N modelos"</text>

    <!-- 4 -->
    <circle cx="14" cy="106" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="110" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">4</text>
    <text x="40" y="104" font-family="ui-monospace, monospace" fill="#333" font-size="11">POST /v1/chat/completions  (qwen-local)</text>
    <text x="40" y="118" fill="#6b6b6b" font-size="10.5">no-streaming · prueba ida-y-vuelta + usage tokens</text>
    <rect x="620" y="96" width="180" height="22" rx="3" fill="#ececec"/>
    <text x="710" y="110" text-anchor="middle" fill="#333" font-size="10" font-weight="600">JSON único</text>

    <!-- 5 -->
    <circle cx="14" cy="138" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="142" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">5</text>
    <text x="40" y="136" font-family="ui-monospace, monospace" fill="#333" font-size="11">POST /v1/chat/completions  stream:true</text>
    <text x="40" y="150" fill="#6b6b6b" font-size="10.5">imprime los primeros 30 eventos SSE crudos</text>
    <rect x="620" y="128" width="180" height="22" rx="3" fill="#ececec"/>
    <text x="710" y="142" text-anchor="middle" fill="#333" font-size="10" font-weight="600">data: ... · [DONE]</text>

    <!-- 6 -->
    <circle cx="14" cy="170" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="174" text-anchor="middle" fill="#c96342" font-size="14" font-weight="700">6</text>
    <text x="40" y="168" font-family="ui-monospace, monospace" fill="#333" font-size="11">POST /v1/embeddings  (nomic-embed)</text>
    <text x="40" y="182" fill="#6b6b6b" font-size="10.5">otro endpoint, otro modelo, 2 vectores · 768 dim</text>
    <rect x="620" y="160" width="180" height="22" rx="3" fill="#ececec"/>
    <text x="710" y="174" text-anchor="middle" fill="#333" font-size="10" font-weight="600">dim: 768</text>
  </g>

  <text x="40" y="932" fill="#6b6b6b" font-size="10">Si falla el paso N, sabes que el problema está entre el N-1 (que pasó) y el N · diagnóstico por bisección. Si /readyz cae, mira primero `make litellm-logs`.</text>
</svg>

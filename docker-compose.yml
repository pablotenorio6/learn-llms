services:
  ollama:
    image: ollama/ollama:latest
    container_name: llmops-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-10m}
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_FLASH_ATTENTION=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: llmops-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: llmops-litellm
    restart: unless-stopped
    # Sin puerto al host: solo accesible desde la red interna de compose.
    # Si quieres pegarle con curl desde el host, descomenta y ajusta.
    # ports:
    #   - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-llmops-changeme}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: llmops-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://litellm:4000}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-llmops-changeme}
      - QDRANT_HOST=${QDRANT_HOST:-http://qdrant:6333}
    volumes:
      # bench/ se monta para iterar sin rebuild
      - ./bench:/app/bench
      # docs/ es la carpeta vigilada por el watcher (RAG)
      - ./docs:/app/docs
    depends_on:
      litellm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ollama_data:
    driver: local
  qdrant_data:
    driver: local

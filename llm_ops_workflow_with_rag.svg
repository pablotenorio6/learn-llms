<svg viewBox="0 0 880 1140" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, sans-serif">
  <title id="title">Arquitectura llm_ops con RAG y LiteLLM (Fase 3 + multi-proveedor)</title>
  <desc id="desc">Tres paneles. Arquitectura: cuatro contenedores (Qdrant, API, LiteLLM, Ollama) en una red Docker, docs/ bind-mounted, GPU del host, cloud opcional. Indexación: cómo un archivo acaba en Qdrant. Query con RAG: cómo un mensaje pasa por el retriever y va al modelo a través de LiteLLM.</desc>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#777"/>
    </marker>
    <marker id="arrow2-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c96342"/>
    </marker>
    <marker id="arrow2-cloud" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a76b8"/>
    </marker>
  </defs>

  <!-- ============== PANEL 1: ARCHITECTURE ============== -->
  <text x="20" y="26" fill="#1a1a1a" font-size="14" font-weight="600">1 · Arquitectura del despliegue (RAG + LiteLLM proxy)</text>

  <!-- Host -->
  <rect x="20" y="40" width="840" height="440" rx="6" fill="#fafafa" stroke="#d4d4d4"/>
  <text x="36" y="62" fill="#6b6b6b" font-size="11" font-weight="500">HOST · WINDOWS + DOCKER DESKTOP</text>

  <!-- Cliente -->
  <rect x="40" y="80" width="125" height="60" rx="4" fill="#ffffff" stroke="#c8c8c8" stroke-width="1.2"/>
  <text x="102.5" y="105" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Cliente</text>
  <text x="102.5" y="122" text-anchor="middle" fill="#6b6b6b" font-size="11">browser · curl · SDK</text>

  <!-- docs/ bind mount -->
  <rect x="185" y="80" width="170" height="60" rx="4" fill="#ffffff" stroke="#c96342" stroke-width="1.5"/>
  <text x="270" y="98" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">📁 docs/</text>
  <text x="270" y="115" text-anchor="middle" fill="#6b6b6b" font-size="11">bind-mount → /app/docs</text>
  <text x="270" y="131" text-anchor="middle" fill="#6b6b6b" font-size="11">.md .txt .pdf .html</text>
  <text x="270" y="74" text-anchor="middle" fill="#c96342" font-size="9" font-weight="700">RAG</text>

  <!-- Cloud LLM APIs (fuera del host) -->
  <rect x="385" y="80" width="265" height="60" rx="4" fill="#f4f8fc" stroke="#4a76b8" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="517.5" y="103" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Cloud LLM APIs</text>
  <text x="517.5" y="120" text-anchor="middle" fill="#6b6b6b" font-size="11">api.openai.com · api.anthropic.com</text>
  <text x="517.5" y="134" text-anchor="middle" fill="#4a76b8" font-size="10" font-weight="600">opcional · si .env tiene API key</text>

  <!-- GPU -->
  <rect x="715" y="80" width="125" height="60" rx="4" fill="#ffffff" stroke="#c8c8c8" stroke-width="1.2"/>
  <text x="777.5" y="105" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">GPU</text>
  <text x="777.5" y="122" text-anchor="middle" fill="#6b6b6b" font-size="11">RTX 4060 · 8 GB</text>

  <!-- Docker network -->
  <rect x="40" y="170" width="820" height="290" rx="6" fill="#ffffff" stroke="#d4d4d4" stroke-dasharray="4 3"/>
  <text x="56" y="190" fill="#6b6b6b" font-size="11" font-weight="500">DOCKER NETWORK · default</text>

  <!-- Qdrant -->
  <rect x="60" y="210" width="190" height="230" rx="5" fill="#ffffff" stroke="#c96342" stroke-width="1.5"/>
  <rect x="60" y="210" width="190" height="22" rx="5" fill="#ececec"/>
  <text x="74" y="226" fill="#333" font-size="10" font-weight="600">CONTAINER · llmops-qdrant</text>
  <text x="74" y="255" fill="#1a1a1a" font-size="13" font-weight="600">Qdrant 1.12</text>
  <text x="74" y="273" fill="#6b6b6b" font-size="11">vector DB</text>
  <text x="74" y="291" fill="#6b6b6b" font-size="11">/points · /search</text>
  <text x="74" y="309" fill="#6b6b6b" font-size="11">colección llmops_docs</text>
  <text x="74" y="327" fill="#6b6b6b" font-size="11">cosine · dim 768</text>
  <text x="74" y="345" fill="#6b6b6b" font-size="11">índices: doc_id, source</text>
  <text x="74" y="363" fill="#6b6b6b" font-size="11">volumen qdrant_data</text>
  <text x="74" y="427" font-family="ui-monospace, monospace" fill="#6b6b6b" font-size="10">:6333 (HTTP) · :6334 (gRPC)</text>

  <!-- API -->
  <rect x="260" y="210" width="190" height="230" rx="5" fill="#ffffff" stroke="#c96342" stroke-width="1.5"/>
  <rect x="260" y="210" width="190" height="22" rx="5" fill="#ececec"/>
  <text x="274" y="226" fill="#333" font-size="10" font-weight="600">CONTAINER · llmops-api</text>
  <text x="274" y="255" fill="#1a1a1a" font-size="13" font-weight="600">FastAPI + Uvicorn</text>
  <text x="274" y="273" fill="#6b6b6b" font-size="11">/v1/chat · /v1/embeddings</text>
  <text x="274" y="291" fill="#6b6b6b" font-size="11">/v1/models /healthz</text>
  <text x="274" y="309" fill="#c96342" font-size="11" font-weight="600">/v1/rag/* (Fase 3)</text>
  <text x="274" y="327" fill="#c96342" font-size="11" font-weight="600">/v1/agents/run (Fase 4)</text>
  <text x="274" y="345" fill="#6b6b6b" font-size="11">middleware · auth · SSE</text>
  <text x="274" y="363" fill="#6b6b6b" font-size="11">LLMClient (openai SDK)</text>
  <text x="274" y="381" fill="#6b6b6b" font-size="11">watcher de docs/ (asyncio)</text>
  <text x="274" y="427" font-family="ui-monospace, monospace" fill="#6b6b6b" font-size="10">:8000 ←→ host:8000</text>

  <!-- LiteLLM (NEW) -->
  <rect x="460" y="210" width="190" height="230" rx="5" fill="#ffffff" stroke="#c96342" stroke-width="1.5"/>
  <rect x="460" y="210" width="190" height="22" rx="5" fill="#fbe6dd"/>
  <text x="474" y="226" fill="#c96342" font-size="10" font-weight="700">CONTAINER · llmops-litellm ★</text>
  <text x="474" y="255" fill="#1a1a1a" font-size="13" font-weight="600">LiteLLM proxy</text>
  <text x="474" y="273" fill="#6b6b6b" font-size="11">control plane:</text>
  <text x="474" y="291" fill="#6b6b6b" font-size="11">· routing por alias</text>
  <text x="474" y="309" fill="#6b6b6b" font-size="11">· master_key + retries</text>
  <text x="474" y="327" fill="#6b6b6b" font-size="11">· cost tracking</text>
  <text x="474" y="345" fill="#6b6b6b" font-size="11">· streaming SSE OpenAI</text>
  <text x="474" y="367" fill="#6b6b6b" font-size="11" font-style="italic">litellm-config.yaml</text>
  <text x="474" y="385" fill="#6b6b6b" font-size="11" font-style="italic">aliases: qwen-local,</text>
  <text x="474" y="400" fill="#6b6b6b" font-size="11" font-style="italic">gpt-4o-mini, claude-… </text>
  <text x="474" y="427" font-family="ui-monospace, monospace" fill="#6b6b6b" font-size="10">:4000 (solo red interna)</text>

  <!-- Ollama -->
  <rect x="660" y="210" width="190" height="230" rx="5" fill="#ffffff" stroke="#c96342" stroke-width="1.5"/>
  <rect x="660" y="210" width="190" height="22" rx="5" fill="#ececec"/>
  <text x="674" y="226" fill="#333" font-size="10" font-weight="600">CONTAINER · llmops-ollama</text>
  <text x="674" y="255" fill="#1a1a1a" font-size="13" font-weight="600">Ollama runtime</text>
  <text x="674" y="273" fill="#6b6b6b" font-size="11">/api/chat · /api/embed</text>
  <text x="674" y="291" fill="#6b6b6b" font-size="11">llama3.1:8b (chat)</text>
  <text x="674" y="309" fill="#6b6b6b" font-size="11">qwen2.5:7b (agente)</text>
  <text x="674" y="327" fill="#c96342" font-size="11" font-weight="600">nomic-embed-text (RAG)</text>
  <text x="674" y="345" fill="#6b6b6b" font-size="11">GGUF en VRAM</text>
  <text x="674" y="363" fill="#6b6b6b" font-size="11">volumen ollama_data</text>
  <text x="674" y="427" font-family="ui-monospace, monospace" fill="#6b6b6b" font-size="10">:11434 → GPU passthrough</text>

  <!-- Arrows architecture -->
  <!-- Cliente → API -->
  <path d="M 102.5 145 L 102.5 300 L 260 300" stroke="#777" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text x="110" y="180" font-family="ui-monospace, monospace" fill="#333" font-size="10">HTTP :8000</text>

  <!-- docs → API (bind mount) -->
  <path d="M 270 145 L 270 175 L 320 175 L 320 210" stroke="#c96342" stroke-width="1.5" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow2-accent)"/>
  <text x="328" y="200" font-family="ui-monospace, monospace" fill="#c96342" font-size="10" font-weight="600">bind mount</text>

  <!-- API ↔ Qdrant -->
  <path d="M 260 270 L 250 270" stroke="#c96342" stroke-width="1.8" fill="none" marker-end="url(#arrow2-accent)" marker-start="url(#arrow2-accent)"/>
  <text x="246" y="262" text-anchor="end" font-family="ui-monospace, monospace" fill="#c96342" font-size="10" font-weight="600">qdrant:6333</text>

  <!-- API → LiteLLM -->
  <path d="M 450 270 L 460 270" stroke="#c96342" stroke-width="1.8" fill="none" marker-end="url(#arrow2-accent)"/>
  <text x="438" y="262" text-anchor="end" font-family="ui-monospace, monospace" fill="#c96342" font-size="10" font-weight="600">OpenAI fmt</text>

  <!-- LiteLLM → Ollama -->
  <path d="M 650 270 L 660 270" stroke="#777" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text x="652" y="262" font-family="ui-monospace, monospace" fill="#333" font-size="10">11434</text>

  <!-- LiteLLM → Cloud -->
  <path d="M 555 210 C 555 175, 517.5 165, 517.5 145" stroke="#4a76b8" stroke-width="1.5" stroke-dasharray="4 2" fill="none" marker-end="url(#arrow2-cloud)"/>
  <text x="525" y="195" font-family="ui-monospace, monospace" fill="#4a76b8" font-size="10" font-weight="600">HTTPS</text>

  <!-- Ollama → GPU -->
  <path d="M 770 210 L 770 145" stroke="#777" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text x="776" y="178" font-family="ui-monospace, monospace" fill="#333" font-size="10">CUDA</text>

  <text x="36" y="472" fill="#6b6b6b" font-size="10">★ La API solo habla con LiteLLM (también para embeddings del RAG). El YAML del proxy es la única fuente de verdad de qué modelos existen.</text>

  <!-- ============== PANEL 2: INGESTA ============== -->
  <text x="20" y="510" fill="#1a1a1a" font-size="14" font-weight="600">2 · Indexación: cómo un archivo acaba en Qdrant</text>

  <rect x="20" y="524" width="840" height="190" rx="6" fill="#fafafa" stroke="#d4d4d4"/>

  <text x="36" y="546" fill="#6b6b6b" font-size="11" font-weight="500">DOS PUNTOS DE ENTRADA</text>

  <rect x="40" y="558" width="200" height="42" rx="5" fill="#ffffff" stroke="#c8c8c8" stroke-width="1.2"/>
  <text x="140" y="576" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">drag &amp; drop en UI</text>
  <text x="140" y="592" text-anchor="middle" fill="#6b6b6b" font-size="11">→ POST /v1/rag/documents</text>

  <rect x="260" y="558" width="200" height="42" rx="5" fill="#ffffff" stroke="#c8c8c8" stroke-width="1.2"/>
  <text x="360" y="576" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">archivo en docs/</text>
  <text x="360" y="592" text-anchor="middle" fill="#6b6b6b" font-size="11">→ watchdog dispara</text>

  <path d="M 140 600 L 140 626 L 480 626" stroke="#c96342" stroke-width="1.5" fill="none" marker-end="url(#arrow2-accent)"/>
  <path d="M 360 600 L 360 626" stroke="#c96342" stroke-width="1.5" fill="none"/>

  <text x="36" y="646" fill="#6b6b6b" font-size="11" font-weight="500">PIPELINE COMÚN (rag/indexer.py)</text>

  <g transform="translate(40, 658)">
    <!-- Step 1 -->
    <circle cx="14" cy="20" r="13" fill="#c96342" opacity="0.15"/>
    <text x="14" y="24" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">1</text>
    <text x="36" y="14" font-family="ui-monospace, monospace" fill="#333" font-size="11">parsers.py</text>
    <text x="36" y="29" fill="#6b6b6b" font-size="10">.pdf .md .html .txt</text>
    <text x="36" y="42" fill="#6b6b6b" font-size="10">→ texto plano</text>

    <path d="M 170 20 L 200 20" stroke="#c96342" stroke-width="1.5" fill="none" marker-end="url(#arrow2-accent)"/>

    <!-- Step 2 -->
    <circle cx="218" cy="20" r="13" fill="#c96342" opacity="0.15"/>
    <text x="218" y="24" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">2</text>
    <text x="240" y="14" font-family="ui-monospace, monospace" fill="#333" font-size="11">chunker.py</text>
    <text x="240" y="29" fill="#6b6b6b" font-size="10">recursive split</text>
    <text x="240" y="42" fill="#6b6b6b" font-size="10">1000 chars · overlap 150</text>

    <path d="M 390 20 L 420 20" stroke="#c96342" stroke-width="1.5" fill="none" marker-end="url(#arrow2-accent)"/>

    <!-- Step 3 -->
    <circle cx="438" cy="20" r="13" fill="#c96342" opacity="0.15"/>
    <text x="438" y="24" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">3</text>
    <text x="460" y="14" font-family="ui-monospace, monospace" fill="#333" font-size="11">embedder.py</text>
    <text x="460" y="29" fill="#6b6b6b" font-size="10">LLMClient.embed → LiteLLM</text>
    <text x="460" y="42" fill="#6b6b6b" font-size="10">→ nomic-embed (Ollama)</text>

    <path d="M 638 20 L 668 20" stroke="#c96342" stroke-width="1.5" fill="none" marker-end="url(#arrow2-accent)"/>

    <!-- Step 4 -->
    <circle cx="686" cy="20" r="13" fill="#c96342" opacity="0.15"/>
    <text x="686" y="24" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">4</text>
    <text x="708" y="14" font-family="ui-monospace, monospace" fill="#333" font-size="11">store.upsert</text>
    <text x="708" y="29" fill="#6b6b6b" font-size="10">→ Qdrant</text>
    <text x="708" y="42" fill="#6b6b6b" font-size="10">id = sha256(chunk)</text>
  </g>

  <text x="36" y="734" fill="#6b6b6b" font-size="10">id determinista por hash del chunk → re-indexar el mismo doc no duplica · borrar por source es atómico</text>

  <!-- ============== PANEL 3: RAG QUERY FLOW ============== -->
  <text x="20" y="770" fill="#1a1a1a" font-size="14" font-weight="600">3 · Mensaje con toggle RAG activo: viaje completo</text>

  <rect x="20" y="784" width="840" height="340" rx="6" fill="#fafafa" stroke="#d4d4d4"/>

  <g transform="translate(40, 807)">
    <!-- 1 -->
    <circle cx="14" cy="10" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="14" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">1</text>
    <text x="40" y="8" font-family="ui-monospace, monospace" fill="#333" font-size="11">UI: usuario envía mensaje</text>
    <text x="40" y="22" fill="#6b6b6b" font-size="10">si toggle RAG está on → primero pasamos por el RAG</text>

    <path d="M 14 26 L 14 38" stroke="#c96342" stroke-width="1.5" fill="none"/>

    <!-- 2 -->
    <circle cx="14" cy="50" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="54" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">2</text>
    <text x="40" y="48" font-family="ui-monospace, monospace" fill="#333" font-size="11">POST /v1/rag/query  {query, top_k:5}</text>
    <text x="40" y="62" fill="#6b6b6b" font-size="10">la API embebe la query con nomic-embed vía LiteLLM → Ollama</text>

    <path d="M 14 66 L 14 78" stroke="#c96342" stroke-width="1.5" fill="none"/>

    <!-- 3 -->
    <circle cx="14" cy="90" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="94" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">3</text>
    <text x="40" y="88" font-family="ui-monospace, monospace" fill="#333" font-size="11">Qdrant: query_points(vector, limit=5)</text>
    <text x="40" y="102" fill="#6b6b6b" font-size="10">cosine similarity → top-5 chunks con score y source</text>

    <path d="M 14 106 L 14 118" stroke="#c96342" stroke-width="1.5" fill="none"/>

    <!-- 4 -->
    <circle cx="14" cy="130" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="134" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">4</text>
    <text x="40" y="128" font-family="ui-monospace, monospace" fill="#333" font-size="11">retriever.as_system_message()</text>
    <text x="40" y="142" fill="#6b6b6b" font-size="10">formatea los chunks como mensaje system con citas [source]</text>

    <path d="M 14 146 L 14 158" stroke="#c96342" stroke-width="1.5" fill="none"/>

    <!-- 5 -->
    <circle cx="14" cy="170" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="174" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">5</text>
    <text x="40" y="168" font-family="ui-monospace, monospace" fill="#333" font-size="11">UI construye messages = [sysUser, sysRAG, ...history, user]</text>
    <text x="40" y="182" fill="#6b6b6b" font-size="10">el system del usuario y el del RAG conviven sin pisarse</text>

    <path d="M 14 186 L 14 198" stroke="#c96342" stroke-width="1.5" fill="none"/>

    <!-- 6 -->
    <circle cx="14" cy="210" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="214" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">6</text>
    <text x="40" y="208" font-family="ui-monospace, monospace" fill="#333" font-size="11">POST /v1/chat/completions  stream:true  model:&lt;alias&gt;</text>
    <text x="40" y="222" fill="#6b6b6b" font-size="10">LLMClient → LiteLLM:4000 · el proxy enruta al backend según el alias</text>

    <path d="M 14 226 L 14 238" stroke="#c96342" stroke-width="1.5" fill="none"/>

    <!-- 7 -->
    <circle cx="14" cy="250" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="254" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">7</text>
    <text x="40" y="248" font-family="ui-monospace, monospace" fill="#333" font-size="11">backend (Ollama/OpenAI/Anthropic) → tokens en streaming</text>
    <text x="40" y="262" fill="#6b6b6b" font-size="10">LiteLLM normaliza el SSE al formato OpenAI · cancelable con Stop</text>

    <path d="M 14 266 L 14 278" stroke="#c96342" stroke-width="1.5" fill="none"/>

    <!-- 8 -->
    <circle cx="14" cy="290" r="12" fill="#c96342" opacity="0.15"/>
    <text x="14" y="294" text-anchor="middle" fill="#c96342" font-size="13" font-weight="700">8</text>
    <text x="40" y="288" font-family="ui-monospace, monospace" fill="#333" font-size="11">UI: render texto + badges de fuentes</text>
    <text x="40" y="302" fill="#6b6b6b" font-size="10">debajo de cada respuesta · TTFT · t/s · "fuentes: file1.md (0.84), …"</text>
  </g>

  <text x="36" y="1132" fill="#6b6b6b" font-size="10">Si el toggle RAG está off, los pasos 2-5 se saltan · /v1/chat/completions sigue siendo OpenAI-compatible y va siempre vía LiteLLM.</text>
</svg>
